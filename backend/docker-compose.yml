version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lwangblack
      POSTGRES_USER: lwangblack
      POSTGRES_PASSWORD: lwangblack_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./src/db/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
      - ./src/db/migrations/002_subscriptions_logistics_social.sql:/docker-entrypoint-initdb.d/003_subscriptions.sql
      - ./src/db/migrations/004_payments_logistics_notifications.sql:/docker-entrypoint-initdb.d/004_payments.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lwangblack -d lwangblack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lb-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────
  api:
    build: .
    container_name: lb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://lwangblack:lwangblack_secret@postgres:5432/lwangblack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-to-random-string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      ESEWA_MERCHANT_ID: ${ESEWA_MERCHANT_ID:-EPAYTEST}
      ESEWA_SECRET_KEY: ${ESEWA_SECRET_KEY:-8gBm/:&EnhH.1/q}
      KHALTI_SECRET_KEY: ${KHALTI_SECRET_KEY:-}
      KHALTI_PUBLIC_KEY: ${KHALTI_PUBLIC_KEY:-}
      KHALTI_LIVE: ${KHALTI_LIVE:-false}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-paypal_client_placeholder}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-paypal_secret_placeholder}
      PAYPAL_LIVE: ${PAYPAL_LIVE:-false}
      NABIL_MERCHANT_ID: ${NABIL_MERCHANT_ID:-NB_MERCHANT_PLACEHOLDER}
      NABIL_SECRET_KEY: ${NABIL_SECRET_KEY:-}
      NABIL_LIVE: ${NABIL_LIVE:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-brewed@lwangblack.co}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Lwang Black}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      SHIPPO_API_KEY: ${SHIPPO_API_KEY:-}
      SITE_URL: ${SITE_URL:-https://www.lwangblack.co}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://www.lwangblack.co,http://localhost:3000}
    ports:
      - "3001:3001"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lb-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
