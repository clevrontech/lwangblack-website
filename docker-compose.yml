# Local / staging stack: API + Postgres + Redis. Frontend is built separately (Vercel) or served via `npm run preview`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lwangblack
      POSTGRES_PASSWORD: lwangblack_secret
      POSTGRES_DB: lwangblack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://lwangblack:lwangblack_secret@postgres:5432/lwangblack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      SITE_URL: ${SITE_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4173,http://localhost:3000}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
