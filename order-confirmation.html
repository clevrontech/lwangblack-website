<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Lwang Black</title>
  <meta name="description" content="Your Lwang Black order has been placed successfully." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="ecommerce.css" />
  <style>
    body { background: #0d0d0d; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }

    .conf-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    .conf-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    .conf-icon.success  { background: rgba(46,98,76,0.3); border: 1px solid rgba(46,98,76,0.5); }
    .conf-icon.pending  { background: rgba(232,160,0,0.15); border: 1px solid rgba(232,160,0,0.4); }
    .conf-icon.cod      { background: rgba(255,193,7,0.12); border: 1px solid rgba(255,193,7,0.35); }

    .conf-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }

    .conf-subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin: 0 0 2rem;
      max-width: 480px;
      line-height: 1.6;
    }

    .conf-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      max-width: 520px;
      width: 100%;
      margin: 0 auto 2rem;
      text-align: left;
    }

    .conf-card-title {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .conf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .conf-row:last-child { border-bottom: none; }
    .conf-row span:first-child { color: rgba(255,255,255,0.45); }
    .conf-row span:last-child  { color: #fff; font-weight: 600; }

    /* Nabil Bank specific */
    .nabil-steps {
      background: rgba(232,160,0,0.06);
      border: 1px solid rgba(232,160,0,0.2);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      max-width: 520px;
      width: 100%;
      margin: 0 auto 2rem;
      text-align: left;
    }
    .nabil-steps-title {
      font-size: 0.62rem;
      color: #e8a000;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }
    .nabil-step-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      margin-bottom: 0.65rem;
      font-size: 0.73rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
    }
    .nabil-step-item .step-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(232,160,0,0.2);
      border: 1px solid rgba(232,160,0,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: #e8a000;
    }

    /* Bank account highlight */
    .bank-highlight {
      background: rgba(232,160,0,0.08);
      border: 1px solid rgba(232,160,0,0.25);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      max-width: 520px;
      width: 100%;
      margin: 0 auto 2rem;
    }
    .bank-acc-num {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #e8a000;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      display: inline-block;
    }
    .bank-acc-num:hover { opacity: 0.8; }

    .conf-btns {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .conf-btn-primary {
      background: #fff;
      color: #0d0d0d;
      border: none;
      padding: 0.85rem 2.2rem;
      border-radius: 50px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .conf-btn-primary:hover { opacity: 0.85; }

    .conf-btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }
    .conf-btn-ghost:hover { border-color: rgba(255,255,255,0.35); color: #fff; }

    .conf-order-id {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      margin-top: 2rem;
    }
  </style>

    <link rel="icon" type="image/png" href="/images/logo-hero.png" />
</head>
<body>

  <!-- PRELOADER -->
  <div id="preloader">
    <div class="spinner"></div>
    <img src="images/Image 1.png" alt="Lwang Black" style="height:60px;object-fit:contain;" onerror="this.style.display='none'" />
  </div>

  <div class="conf-wrap" id="conf-wrap">
    <!-- content injected by JS -->
  </div>

  <script src="lwb-api.js"></script>
  <script src="cart.js"></script>
  <script>
    // Hide preloader
    setTimeout(() => {
      const pl = document.getElementById('preloader');
      if (pl) { pl.style.opacity = '0'; setTimeout(() => pl.remove(), 400); }
    }, 500);

    const wrap = document.getElementById('conf-wrap');
    const urlParams = new URLSearchParams(window.location.search);
    const orderFromQuery = urlParams.get('order') || '';
    const legacyOrderId = urlParams.get('order_id') || '';
    const orderId = legacyOrderId || orderFromQuery;
    const method    = urlParams.get('method')   || '';
    const sessionId = urlParams.get('session_id') || '';
    const failed    = urlParams.get('failed') === 'true';

    // Helper: get saved order from localStorage
    function getLocalOrder(id) {
      try {
        const list = JSON.parse(localStorage.getItem('lb_orders') || '[]');
        return list.find(o => o.id === id) || null;
      } catch { return null; }
    }

    // Helper: format currency amount
    function fmtAmount(order, backendData) {
      const sym   = order?.symbol || backendData?.currency || 'NPR';
      const total = order?.total  || backendData?.total || 0;
      if (!total) return '—';
      return typeof sym === 'string' && sym.length <= 4
        ? `${sym}${Number(total).toLocaleString()}`
        : `${Number(total).toLocaleString()} ${sym}`;
    }

    // Helper: build order summary card rows
    function orderCard(localOrder, backendData, statusHtml) {
      const o = localOrder;
      if (!o && !backendData) return `<div style="font-size:0.75rem;color:rgba(255,255,255,0.35);">Order ID: ${orderId || '—'}</div>`;
      const name = o ? `${o.customer?.fname||''} ${o.customer?.lname||''}`.trim() : '';
      const pm   = (o?.paymentMethod || method || backendData?.paymentMethod || '').replace(/_/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
      return `
        ${name ? `<div class="conf-row"><span>Customer</span><span>${name}</span></div>` : ''}
        ${o?.customer?.email ? `<div class="conf-row"><span>Email</span><span>${o.customer.email}</span></div>` : ''}
        <div class="conf-row"><span>Order ID</span><span>${orderId}</span></div>
        <div class="conf-row"><span>Total</span><span>${fmtAmount(o, backendData)}</span></div>
        ${pm ? `<div class="conf-row"><span>Payment</span><span>${pm}</span></div>` : ''}
        <div class="conf-row"><span>Status</span><span>${statusHtml}</span></div>`;
    }

    function renderOrderFromApi(order) {
      const label = order.orderNumber || order.id;
      const pm = String(order.paymentMethod || 'cod').toLowerCase();
      const isCod = pm === 'cod';
      const itemsHtml = (order.lineItems || []).map((i) => {
        const line = Number(i.price) * Number(i.qty);
        return `<div class="conf-row"><span>${i.name || ''}${i.variantTitle ? ` (${i.variantTitle})` : ''} × ${i.qty}</span><span>${line}</span></div>`;
      }).join('');
      const totalStr = order.totalDisplay || order.total || '—';
      const cust = order.customer || {};
      const email = cust.email || '';
      const name = cust.name || '';
      const addr = order.shippingAddress || {};
      const shipLine = [addr.address, addr.city, addr.postalCode, addr.country].filter(Boolean).join(', ');

      if (isCod) {
        wrap.innerHTML = `
        <div class="conf-icon cod">💵</div>
        <h1 class="conf-title">Order Placed!</h1>
        <p class="conf-subtitle">
          Your Cash on Delivery order has been recorded.<br>
          Please have the exact amount ready when your package arrives.
        </p>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          ${name ? `<div class="conf-row"><span>Customer</span><span>${name}</span></div>` : ''}
          ${email ? `<div class="conf-row"><span>Email</span><span>${email}</span></div>` : ''}
          <div class="conf-row"><span>Order</span><span>${label}</span></div>
          <div class="conf-row"><span>Total</span><span>${totalStr}</span></div>
          <div class="conf-row"><span>Payment</span><span>Cash on Delivery</span></div>
          ${itemsHtml ? `<div style="margin-top:1rem">${itemsHtml}</div>` : ''}
          ${shipLine ? `<div class="conf-row"><span>Ship to</span><span>${shipLine}</span></div>` : ''}
        </div>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">CONTINUE SHOPPING</a>
          <a href="contact.html" class="conf-btn-ghost">CONTACT US</a>
        </div>
        <div class="conf-order-id">ORDER · ${label}</div>`;
        return;
      }
      wrap.innerHTML = `
        <div class="conf-icon success">✓</div>
        <h1 class="conf-title">Order Confirmed!</h1>
        <p class="conf-subtitle">
          Thank you for your purchase.${email ? ` Confirmation sent to <strong>${email}</strong>.` : ''}
        </p>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          <div class="conf-row"><span>Order</span><span>${label}</span></div>
          <div class="conf-row"><span>Total</span><span>${totalStr}</span></div>
          <div class="conf-row"><span>Payment</span><span>${pm.toUpperCase()}</span></div>
          ${itemsHtml ? `<div style="margin-top:1rem">${itemsHtml}</div>` : ''}
        </div>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">CONTINUE SHOPPING</a>
          <a href="index.html" class="conf-btn-ghost">HOME</a>
        </div>
        <div class="conf-order-id">ORDER · ${label}</div>`;
    }

    // ── Render functions ──────────────────────────────────────────────────────
    function renderLoading(msg) {
      wrap.innerHTML = `
        <div style="text-align:center;padding:4rem 1rem;">
          <div id="conf-spinner" style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.5);border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 1.5rem;"></div>
          <p id="conf-loading-msg" style="font-size:0.8rem;color:rgba(255,255,255,0.45);">${msg || 'Verifying your payment…'}</p>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
    }

    function renderPaid(localOrder, backendData) {
      wrap.innerHTML = `
        <div class="conf-icon success">✓</div>
        <h1 class="conf-title">Order Confirmed!</h1>
        <p class="conf-subtitle">
          Thank you for your purchase. Your payment has been received and your order is being prepared.<br>
          A confirmation email will be sent to you shortly.
        </p>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          ${orderCard(localOrder, backendData, '<span style="color:#2e9e6c;">✓ Payment Received</span>')}
        </div>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">CONTINUE SHOPPING</a>
          <a href="index.html" class="conf-btn-ghost">HOME</a>
        </div>
        <div class="conf-order-id">ORDER ID · ${orderId}</div>`;
    }

    function renderCOD(localOrder) {
      wrap.innerHTML = `
        <div class="conf-icon cod">💵</div>
        <h1 class="conf-title">Order Placed!</h1>
        <p class="conf-subtitle">
          Your Cash on Delivery order has been placed successfully.<br>
          Please have the exact cash amount ready when your package arrives.
        </p>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          ${orderCard(localOrder, null, '<span style="color:#ffc107;">📦 Awaiting Delivery</span>')}
          ${localOrder?.customer?.street ? `<div class="conf-row"><span>Delivery To</span><span>${localOrder.customer.street}, ${localOrder.customer.city}</span></div>` : ''}
        </div>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">CONTINUE SHOPPING</a>
          <a href="contact.html" class="conf-btn-ghost">CONTACT US</a>
        </div>
        <div class="conf-order-id">ORDER ID · ${orderId}</div>`;
    }

    function renderNabilPending(localOrder) {
      wrap.innerHTML = `
        <div class="conf-icon pending">🏦</div>
        <h1 class="conf-title" style="color:#e8a000;">Payment Processing</h1>
        <p class="conf-subtitle">
          We have received your order. Your Nabil Bank payment is being verified.<br>
          This is usually confirmed within <strong style="color:#fff;">1–2 business hours</strong>.
        </p>
        <div class="bank-highlight" style="text-align:center;">
          <div style="font-size:0.6rem;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:0.4rem;">PAYMENT TO — NABIL BANK LTD.</div>
          <div style="font-size:0.7rem;color:rgba(255,255,255,0.55);margin-bottom:0.3rem;">LWANG BLACK PRODUCTS PVT.LTD</div>
          <span class="bank-acc-num" onclick="copyNum()" title="Click to copy">15301017500402</span>
          <div style="font-size:0.58rem;color:rgba(255,255,255,0.3);margin-top:0.3rem;" id="copy-msg">Click to copy</div>
        </div>
        <div class="nabil-steps">
          <div class="nabil-steps-title">What happens next?</div>
          <div class="nabil-step-item"><div class="step-num">1</div><div>Your payment is being verified against our Nabil Bank account <span style="color:#e8a000;">15301017500402</span>.</div></div>
          <div class="nabil-step-item"><div class="step-num">2</div><div>Once confirmed, you'll receive an order confirmation via email or phone.</div></div>
          <div class="nabil-step-item"><div class="step-num">3</div><div>Your order will be dispatched. Delivery within 2–5 business days within Nepal.</div></div>
        </div>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          ${orderCard(localOrder, null, '<span style="color:#e8a000;">⏳ Awaiting Payment Verification</span>')}
        </div>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">CONTINUE SHOPPING</a>
          <a href="contact.html" class="conf-btn-ghost">CONTACT US</a>
        </div>
        <div class="conf-order-id">ORDER ID · ${orderId}</div>`;
    }

    function renderStripePending(localOrder) {
      wrap.innerHTML = `
        <div class="conf-icon pending">⏳</div>
        <h1 class="conf-title" style="color:#e8a000;">Payment Processing</h1>
        <p class="conf-subtitle">
          Your payment is still being confirmed by the payment processor.<br>
          Please do not close this page.
        </p>
        <div style="text-align:center;margin:2rem 0;">
          <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#e8a000;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto;"></div>
          <p id="conf-loading-msg" style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:1rem;">Checking payment status…</p>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <div class="conf-card">
          <div class="conf-card-title">Order Summary</div>
          ${orderCard(localOrder, null, '<span style="color:#e8a000;">⏳ Confirming</span>')}
        </div>
        <div class="conf-btns">
          <a href="contact.html" class="conf-btn-ghost">CONTACT SUPPORT</a>
        </div>
        <div class="conf-order-id">ORDER ID · ${orderId}</div>`;
    }

    function renderFailed(localOrder) {
      wrap.innerHTML = `
        <div class="conf-icon pending" style="background:rgba(255,80,80,0.1);border-color:rgba(255,80,80,0.4);">✕</div>
        <h1 class="conf-title" style="color:rgba(255,120,120,0.9);">Payment Failed</h1>
        <p class="conf-subtitle">
          Your payment was not completed. Your card has not been charged.<br>
          Please try again or choose a different payment method.
        </p>
        <div class="conf-btns">
          <a href="checkout.html" class="conf-btn-primary">TRY AGAIN</a>
          <a href="contact.html" class="conf-btn-ghost">CONTACT SUPPORT</a>
        </div>
        ${orderId ? `<div class="conf-order-id">ORDER ID · ${orderId}</div>` : ''}`;
    }

    function renderNotFound() {
      wrap.innerHTML = `
        <div class="conf-icon pending" style="background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);">?</div>
        <h1 class="conf-title" style="color:rgba(255,255,255,0.6);">Order Not Found</h1>
        <p class="conf-subtitle">
          We couldn't find this order. If you just placed an order, it may still be processing.<br>
          Contact us with your order ID for assistance.
        </p>
        <div class="conf-btns">
          <a href="shop.html" class="conf-btn-primary">BACK TO SHOP</a>
          <a href="contact.html" class="conf-btn-ghost">CONTACT SUPPORT</a>
        </div>
        ${orderId ? `<div class="conf-order-id">ORDER ID · ${orderId}</div>` : ''}`;
    }

    // ── Poll for payment confirmation (Stripe takes a moment) ─────────────────
    async function pollForPayment(localOrder, maxAttempts) {
      maxAttempts = maxAttempts || 15;
      for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 2000));
        const msgEl = document.getElementById('conf-loading-msg');
        if (msgEl) msgEl.textContent = `Verifying payment… (${i + 1}/${maxAttempts})`;
        try {
          const res = await fetch(`/api/payments/status/${orderId}`);
          if (res.ok) {
            const data = await res.json();
            if (data.status === 'paid') { renderPaid(localOrder, data); return; }
            if (data.status === 'cancelled') { renderFailed(localOrder); return; }
          }
        } catch (e) { /* keep polling */ }
      }
      // Timed out — show pending state
      renderStripePending(localOrder);
    }

    // ── Main: verify real payment status from backend ─────────────────────────
    async function verifyAndRender() {
      if (orderFromQuery && /^LWB-/i.test(orderFromQuery)) {
        renderLoading('Loading your order…');
        try {
          const apiUrl = window.lwbApiUrl
            ? window.lwbApiUrl('/orders/' + encodeURIComponent(orderFromQuery))
            : (String(window.LWB_API_BASE || '').replace(/\/$/, '') + '/orders/' + encodeURIComponent(orderFromQuery));
          const res = await fetch(apiUrl);
          const data = await res.json();
          if (data.success && data.order) {
            renderOrderFromApi(data.order);
            return;
          }
        } catch (e) {
          console.warn('[order-confirmation]', e);
        }
      }

      if (!orderId) { renderNotFound(); return; }
      if (failed)   { renderFailed(getLocalOrder(orderId)); return; }

      const localOrder = getLocalOrder(orderId);

      // Show loading while we verify
      renderLoading('Verifying your payment…');

      // ── Stripe: use session verification endpoint (fires before webhook) ──
      const isStripeMethod = ['stripe', 'card', 'apple_pay', 'google_pay', 'afterpay'].includes(method);
      if (sessionId && isStripeMethod) {
        try {
          const vRes = await fetch(`/api/payments/stripe-session-verify?session_id=${sessionId}&order_id=${orderId}`);
          if (vRes.ok) {
            const vData = await vRes.json();
            if (vData.status === 'paid') { renderPaid(localOrder, vData); return; }
          }
        } catch (e) { /* fall through to polling */ }
        // Stripe returned paid in checkout but webhook not yet processed — poll
        renderStripePending(localOrder);
        await pollForPayment(localOrder);
        return;
      }

      // ── All other methods: check actual order status from backend ──
      try {
        const sRes = await fetch(`/api/payments/status/${orderId}`);

        if (sRes.status === 404) {
          // Order not in backend — if we have local data, show based on method
          if (localOrder) {
            if (method === 'cod') { renderCOD(localOrder); return; }
            if (method === 'nabil' || method === 'nabil_bank') { renderNabilPending(localOrder); return; }
          }
          renderNotFound();
          return;
        }

        if (!sRes.ok) throw new Error('Status check failed');

        const statusData = await sRes.json();
        const pm = statusData.paymentMethod || method;

        if (statusData.status === 'paid') {
          renderPaid(localOrder, statusData);
        } else if (pm === 'cod') {
          renderCOD(localOrder);
        } else if (pm === 'nabil' || pm === 'nabil_bank') {
          renderNabilPending(localOrder);
        } else if (statusData.status === 'cancelled') {
          renderFailed(localOrder);
        } else {
          // Pending for an online gateway (khalti, esewa, paypal) — poll briefly
          renderStripePending(localOrder);
          await pollForPayment(localOrder, 8);
        }

      } catch (e) {
        // Backend not reachable — fallback to localStorage
        if (localOrder) {
          if (method === 'cod') { renderCOD(localOrder); return; }
          if (method === 'nabil' || method === 'nabil_bank') { renderNabilPending(localOrder); return; }
          // For online payments with no backend: show pending, not confirmed
          renderStripePending(localOrder);
        } else {
          renderNotFound();
        }
      }
    }

    // Copy bank account number helper
    function copyNum() {
      navigator.clipboard.writeText('15301017500402').then(() => {
        const msg = document.getElementById('copy-msg');
