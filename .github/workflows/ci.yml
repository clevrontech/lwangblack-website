name: CI — Backend Tests & Admin Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-refresh-secret

  admin-build:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lwang-black-backend ./backend

      - name: Verify container starts
        run: |
          docker run -d --name lb-test -e NODE_ENV=test -e JWT_SECRET=test -e JWT_REFRESH_SECRET=test -p 3001:3001 lwang-black-backend
          sleep 5
          curl -f http://localhost:3001/api/health || exit 1
          docker stop lb-test
