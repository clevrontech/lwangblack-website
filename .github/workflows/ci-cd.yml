name: Lwang Black — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Backend Tests
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend test suite
        run: npm test -- --testTimeout=20000 --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          DATABASE_URL: ''
          DB_HOST: ''

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Admin Dashboard Build
  # ──────────────────────────────────────────────────────────────────────────
  build-admin:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install admin dashboard dependencies
        run: npm ci
        working-directory: admin-dashboard

      - name: Build admin dashboard
        run: npm run build
        working-directory: admin-dashboard
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.lwangblack.co' }}

      - name: Verify build output
        run: |
          if [ ! -f "admin-dashboard/dist/index.html" ]; then
            echo "ERROR: admin-dashboard/dist/index.html not found!"
            exit 1
          fi
          echo "✅ Admin dashboard build successful"
          ls -lh admin-dashboard/dist/

      - name: Upload admin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Vercel (frontend + admin) — only on push to main
  # ──────────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, build-admin]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Download admin build
        uses: actions/download-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist/

      - name: Deploy to Vercel Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy Backend to Render — only on push to main
  # ──────────────────────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not configured — skipping Render deploy"
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
          grep -q "^2" && echo "✅ Render deploy triggered" || echo "⚠️  Render deploy hook returned non-2xx"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Health Check after deploy
  # ──────────────────────────────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-render]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Wait for deploys to stabilise
        run: sleep 30

      - name: Check frontend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.lwangblack.co)
          echo "Frontend status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] && echo "✅ Frontend healthy" || echo "⚠️  Frontend returned $STATUS"

      - name: Check backend API health
        run: |
          RESPONSE=$(curl -s https://api.lwangblack.co/api/health || echo '{"status":"unreachable"}')
          echo "API response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status"' && echo "✅ Backend API healthy" || echo "⚠️  Backend API health check failed"

      - name: Check admin dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.lwangblack.co/admin/)
          echo "Admin status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Admin dashboard healthy" || echo "⚠️  Admin dashboard returned $STATUS"
