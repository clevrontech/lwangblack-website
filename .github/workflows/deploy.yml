name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Run tests
        working-directory: backend
        run: |
          npm ci
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET: deploy-test-secret
          JWT_REFRESH_SECRET: deploy-refresh-secret

      - name: Build admin dashboard
        working-directory: admin-dashboard
        run: |
          npm ci
          npm run build

      - name: Build and push Docker image
        if: env.DOCKER_REGISTRY != ''
        working-directory: backend
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin "${DOCKER_REGISTRY}"
          docker build -t "${DOCKER_REGISTRY}/lwang-black-backend:latest" -t "${DOCKER_REGISTRY}/lwang-black-backend:${GITHUB_SHA}" .
          docker push "${DOCKER_REGISTRY}/lwang-black-backend:latest"
          docker push "${DOCKER_REGISTRY}/lwang-black-backend:${GITHUB_SHA}"

  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
