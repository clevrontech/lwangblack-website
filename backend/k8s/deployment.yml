apiVersion: apps/v1
kind: Deployment
metadata:
  name: lwangblack-api
  labels:
    app: lwangblack-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lwangblack-api
  template:
    metadata:
      labels:
        app: lwangblack-api
    spec:
      containers:
        - name: api
          image: lwangblack/api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: lwangblack-config
            - secretRef:
                name: lwangblack-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lwangblack-api-svc
spec:
  selector:
    app: lwangblack-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lwangblack-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: "lwangblack-api-svc"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.lwangblack.co
      secretName: lwangblack-tls
  rules:
    - host: api.lwangblack.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lwangblack-api-svc
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lwangblack-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lwangblack-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lwangblack-config
data:
  NODE_ENV: "production"
  PORT: "3001"
  SITE_URL: "https://www.lwangblack.co"
  CORS_ORIGIN: "https://www.lwangblack.co"
